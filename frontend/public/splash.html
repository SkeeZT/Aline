<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting AI MaxiFAI...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #1a1a1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: #ffffff;
    }
    
    .logo {
      width: 150px;
      height: 150px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
    }
    
    .title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    
    .loading {
      display: inline-block;
      position: relative;
      width: 250px;
      height: 6px;
      background-color: #333;
      border-radius: 3px;
      overflow: hidden;
    }
    
    .loading-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      border-radius: 3px;
      animation: loading 2s infinite linear;
    }
    
    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #aaa;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 198, 255, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(0, 198, 255, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 198, 255, 0); }
    }
    
    @keyframes loading {
      0% { left: -40%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="logo">AF</div>
  <div class="title">AI MaxiFAI</div>
  <div class="loading">
    <div class="loading-bar"></div>
  </div>
  <div class="status">Initializing...</div>
  
  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('update-status', (event, message) => {
      document.querySelector('.status').textContent = message;
    });
  </script>
</body>
</html>
